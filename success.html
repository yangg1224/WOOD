<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Order Confirmed — Cobble</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    body { background: #FFFFFF; font-family: 'Inter', sans-serif; color: #3D2E2E; -webkit-font-smoothing: antialiased; }
  </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center text-center px-6">

  <a href="/" style="position:absolute;top:24px;left:24px;">
    <img src="reference/brand_assets/cobble-logo-transparent.png" alt="Cobble" style="height:36px;width:auto;" />
  </a>

  <div style="max-width: 440px;">
    <div style="width:64px;height:64px;border-radius:50%;background:#E3E0AC;display:flex;align-items:center;justify-content:center;margin:0 auto 24px;">
      <svg width="28" height="28" fill="none" stroke="#3D2E2E" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
    </div>
    <h1 style="font-family:'Cormorant Garamond',Georgia,serif;font-size:clamp(36px,5vw,52px);font-weight:600;color:#3D2E2E;margin-bottom:12px;letter-spacing:0;line-height:1.05;">Order received.</h1>
    <p style="font-size:17px;line-height:1.75;color:#7A5E5E;margin-bottom:32px;">Thank you for your Cobble order. You'll receive a confirmation email shortly with your order details.</p>
    <a href="/" style="display:inline-block;background:#5B4545;color:#FFFFFF;font-family:'Cormorant Garamond',Georgia,serif;font-weight:600;padding:14px 36px;border-radius:6px;text-decoration:none;font-size:18px;letter-spacing:.02em;box-shadow:0 2px 8px rgba(61,46,46,.18);">Back to Shop</a>
  </div>

  <script>
    // Clear cart on successful checkout
    localStorage.removeItem('cobble_cart');
  </script>
</body>
</html>
